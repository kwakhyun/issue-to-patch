name: Bug report
description: Report a reproducible problem in issue-to-patch.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, config, issue input, and repository shape needed to reproduce.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste `gia doctor --repo <repo> --json` output when possible. Remove secrets.
      render: json
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, model backend, sandbox mode, and package version.
    validations:
      required: true

