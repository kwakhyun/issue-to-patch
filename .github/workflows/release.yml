name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Smoke test wheel
        run: |
          python -m venv /tmp/gia-release-smoke
          /tmp/gia-release-smoke/bin/pip install dist/*.whl
          /tmp/gia-release-smoke/bin/gia --version
          VERSION=$(/tmp/gia-release-smoke/bin/gia --version | awk '{print $2}')
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
